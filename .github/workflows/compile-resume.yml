name: Compile Resume

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'Lakshit_Verma_Resume.tex'
      - '*.cls'
      - 'index.html'
  workflow_dispatch:

jobs:
  build_and_commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install TeX Live and PDF tools
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-fonts-recommended texlive-fonts-extra texlive-latex-extra poppler-utils

      - name: Compile Resume
        env:
          TZ: "Asia/Kolkata"
        run: |
          mkdir -p docs
          pdflatex -output-directory=docs -halt-on-error Lakshit_Verma_Resume.tex
          pdflatex -output-directory=docs -halt-on-error Lakshit_Verma_Resume.tex

      - name: Generate high-res thumbnail
        run: |
          pdftoppm -png -r 300 -singlefile docs/Lakshit_Verma_Resume.pdf docs/og-thumbnail

      - name: Render landing page
        run: |
          GITHUB_PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          sed "s|{{OG_BASE_URL}}|${GITHUB_PAGES_URL}|g" index.html > docs/index.html

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update compiled resume PDF, thumbnail, and landing page"
          file_pattern: "docs/Lakshit_Verma_Resume.pdf docs/og-thumbnail.png docs/index.html"
