<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lakshit Verma - Resume</title>
    <meta name="description" content="Resume of Lakshit Verma.">

    <!-- Open Graph / link preview metadata -->
    <meta property="og:title" content="Lakshit Verma - Resume">
    <meta property="og:description" content="View the resume of Lakshit Verma.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{OG_BASE_URL}}">
    <meta property="og:image" content="{{OG_BASE_URL}}og-thumbnail.png">
    <meta property="og:image:width" content="2550">
    <meta property="og:image:height" content="3300">
    <meta property="og:image:alt" content="Preview of Lakshit Verma's resume">

    <!-- Twitter / X card metadata -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Lakshit Verma - Resume">
    <meta name="twitter:description" content="View the resume of Lakshit Verma.">
    <meta name="twitter:image" content="{{OG_BASE_URL}}og-thumbnail.png">

    <style>
        :root {
            --bg: #f4f4f5;
            --text: #18181b;
            --muted: #52525b;
            --card: #ffffff;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        main {
            max-width: 920px;
            margin: 0 auto;
            padding: 3rem 1.25rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            margin: 0 0 0.25rem;
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            margin: 0;
            color: var(--muted);
        }

        .preview-card {
            background: var(--card);
            border-radius: 12px;
            padding: 1rem;
            box-shadow: var(--shadow);
        }

        .preview-card img {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 8px;
            border: 1px solid #e4e4e7;
        }

        .actions {
            margin-top: 1.75rem;
            text-align: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.85rem 1.75rem;
            background: var(--text);
            color: #fff;
            text-decoration: none;
            border-radius: 999px;
            font-weight: 600;
            font-size: 1rem;
            transition: transform 0.15s ease, background 0.15s ease;
        }

        .btn:hover {
            background: #27272a;
            transform: translateY(-1px);
        }

        .btn svg {
            width: 1.1rem;
            height: 1.1rem;
            fill: currentColor;
        }

        footer {
            margin-top: 2.5rem;
            text-align: center;
            color: var(--muted);
            font-size: 0.875rem;
        }

        @media (max-width: 600px) {
            main {
                padding: 1.5rem 1rem;
            }

            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <main>
        <header>
            <h1>Lakshit Verma</h1>
            <p class="subtitle">Resume</p>
        </header>

        <div class="preview-card">
            <img src="og-thumbnail.png" alt="Preview of Lakshit Verma's resume">
        </div>

        <div class="actions">
            <a class="btn" href="Lakshit_Verma_Resume.pdf" download>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-8 2v2h16v-2H4z"/>
                </svg>
                Download PDF
            </a>
        </div>

        <footer>
            Last updated automatically from the latest source.
        </footer>
    </main>
</body>
</html>
